<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debug Challenge</title>
<link rel="stylesheet" href="../../../css/syntax-error.css">
</head>
</head>
<body>

<nav>
  <strong>Pixiecode</strong>
  <div><a href="/index.html">Home</a></div>
</nav>

<div class="container">
  <div class="topbar">
    <div class="level">Level: <span id="level">1</span></div>
  </div>

  <div class="game" id="gameSection">
    <div class="timer">Time left: <span id="time">30</span>s</div>
    <p class="tries">Wrong attempts this question: <span id="tries">0</span>/3</p>
    <p class="progress">Question: <span id="questionCount">1</span>/<span id="totalQuestions">60</span></p>    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>    <h3 id="question"></h3>
    <pre id="code"></pre>
    <input id="answer" placeholder="Type answer here">
    <br>
    <button onclick="check()">Submit</button>
    <button onclick="giveUp()">Give Up</button>
    <p id="result"></p>
    <p class="hint" id="hint"></p>
  </div>

  <div id="finalResult" class="result-box" style="display:none;">
    <h2>🏆 Challenge Completed!</h2>
    <p>Total Questions Answered: <span id="totalAnswered">0</span></p>
    <p>Total Wrong Attempts: <span id="totalWrong">0</span></p>
    <p>Total Score: <span id="totalScore">0</span></p>
    <button onclick="goHome()">Back to Home</button>
  </div>
</div>

<script>
// ====== Sound Effects ======
function playSuccessSound() {
  try {
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioContext.createOscillator();
    const gainNode = audioContext.createGain();
    
    oscillator.connect(gainNode);
    gainNode.connect(audioContext.destination);
    
    oscillator.frequency.setValueAtTime(523, audioContext.currentTime); // C5
    oscillator.frequency.setValueAtTime(659, audioContext.currentTime + 0.1); // E5
    oscillator.frequency.setValueAtTime(784, audioContext.currentTime + 0.2); // G5
    
    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
    
    oscillator.start(audioContext.currentTime);
    oscillator.stop(audioContext.currentTime + 0.3);
  } catch(e) {
    // Fallback: no sound if Web Audio API not supported
  }
}

function playFailureSound() {
  try {
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioContext.createOscillator();
    const gainNode = audioContext.createGain();
    
    oscillator.connect(gainNode);
    gainNode.connect(audioContext.destination);
    
    oscillator.frequency.setValueAtTime(392, audioContext.currentTime); // G4
    oscillator.frequency.setValueAtTime(330, audioContext.currentTime + 0.1); // E4
    oscillator.frequency.setValueAtTime(262, audioContext.currentTime + 0.2); // C4
    
    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
    
    oscillator.start(audioContext.currentTime);
    oscillator.stop(audioContext.currentTime + 0.3);
  } catch(e) {
    // Fallback: no sound if Web Audio API not supported
  }
}

// ====== Variables ======
let timer;
let timeLeft = 30;
let current;
let tries = 0;
let totalWrong = 0;
let totalScore = 0;
let totalAnswered = 0;
let questionAnswered = false;
let isInGameSession = false; // Track if user is actively playing

// ====== Warning for leaving during game ======
window.addEventListener('beforeunload', function(e) {
  if (isInGameSession) {
    e.preventDefault();
    e.returnValue = 'You are currently answering a question. Are you sure you want to leave? Your progress will be lost!';
    return e.returnValue;
  }
});

// ====== Questions ======
const baseChallenges = [
  {q:"public _____ class Animal", a:"abstract", h:"Keyword to define a class that cannot be instantiated."},
  {q:"public _____ void eat();", a:"abstract", h:"Method signature without a body."},
  {q:"class Dog _____ Animal", a:"extends", h:"Keyword for a class to inherit from an abstract class."},
  {q:"public _____ interface Drawable", a:"interface", h:"Keyword to define a contract of methods."},
  {q:"class Circle _____ Drawable", a:"implements", h:"Keyword for a class to use an interface."},
  {q:"Animal a = _____ Dog();", a:"new", h:"Creating an instance of a concrete subclass."},
  {q:"public _____ void run() { }", a:"default", h:"Interface method that has a body."},
  {q:"_____ cannot be instantiated.", a:"Abstract", h:"Type of class that serves only as a blueprint."},
  {q:"A class can implement _____ interfaces.", a:"multiple", h:"The ability to use more than one interface."},
  {q:"@_____", a:"Override", h:"Annotation used when providing an implementation."},
  {q:"public _____ final int X = 10;", a:"static", h:"Constant type inside an interface."},
  {q:"abstract methods have no _____;", a:"body", h:"The { } part of a method."},
  {q:"interface methods are _____ by default.", a:"public", h:"Access level of interface methods."},
  {q:"An abstract class _____ have a constructor.", a:"can", h:"Abstract classes use these for field initialization."},
  {q:"_____ method cannot be abstract.", a:"private", h:"Visibility level that prevents overriding."},
  {q:"interface Shape { _____ draw(); }", a:"void", h:"Typical return type for an action method."},
  {q:"_____ classes must implement abstract methods.", a:"Concrete", h:"Classes that are not abstract."},
  {q:"abstract class MyClass { _____ x; }", a:"int", h:"Abstract classes can hold instance variables."},
  {q:"class A implements B, _____", a:"C", h:"Syntax for implementing two interfaces."},
  {q:"public _____ void log() { ... }", a:"static", h:"Method in interface called without an object."},
  {q:"interface _____ extends OtherInterface", a:"extends", h:"How one interface inherits from another."},
  {q:"Abstract classes support _____", a:"constructors", h:"Something interfaces traditionally lack."},
  {q:"_____ methods are used for utility in interfaces.", a:"Static", h:"Methods that belong to the interface class."},
  {q:"Animal a = new _____( ); // Error", a:"Animal", h:"You cannot do this to an abstract class."},
  {q:"_____ methods help with backward compatibility.", a:"Default", h:"Methods added to interfaces without breaking classes."}
];

// Duplicate
let fullChallenges = [];
for(let i=0;i<1;i++) fullChallenges.push(...baseChallenges);

// Shuffle questions
function shuffleArray(array){
  for(let i=array.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}
shuffleArray(fullChallenges);

// Set total questions
const totalQuestions = fullChallenges.length;
document.getElementById("totalQuestions").innerText = totalQuestions;

// ====== Load Question ======
function loadChallenge(){
  if(fullChallenges.length === 0){
    isInGameSession = false; // Game completed
    showFinalResult();
    return;
  }

  questionAnswered = false; // reset
  isInGameSession = true; // User is now actively playing
  current = fullChallenges[0];
  tries = 0;

  document.getElementById("tries").innerText = tries;
  document.getElementById("question").innerText = current.q;
  document.getElementById("code").innerText = current.code || "";
  document.getElementById("hint").innerText = "Hint: " + current.h;
  document.getElementById("answer").value = "";
  document.getElementById("result").innerText = "";

  document.getElementById("questionCount").innerText = totalQuestions - fullChallenges.length + 1;

  // Update progress bar
  const currentQuestion = totalQuestions - fullChallenges.length + 1;
  const progressPercent = ((currentQuestion - 1) / totalQuestions) * 100;
  document.getElementById("progress-fill").style.width = progressPercent + "%";

  startTimer();
}

// ====== Timer ======
function startTimer(){
  clearInterval(timer);
  let t = timeLeft;
  document.getElementById("time").innerText = t;

  timer = setInterval(()=>{
    t--;
    document.getElementById("time").innerText = t;
    if(t <= 0){
      clearInterval(timer);
      if(!questionAnswered) totalWrong +=1;
      playFailureSound();
      isInGameSession = false; // Question timed out
      fullChallenges.shift();
      loadChallenge();
    }
  },1000);
}

// ====== Check Answer ======
function check(){
  let user = document.getElementById("answer").value.trim();

  if(user === current.a){
    let questionScore = Number(document.getElementById("time").innerText);
    totalScore += questionScore;
    questionAnswered = true;
    totalAnswered++;
    if(tries>0) totalWrong +=1;

    clearInterval(timer);
    document.getElementById("result").innerText = "✅ Correct!";
    playSuccessSound();
    isInGameSession = false; // Question completed

    setTimeout(()=>{
      fullChallenges.shift();
      loadChallenge();
    },1500);

  } else {
    tries++;
    document.getElementById("tries").innerText = tries;
    if(tries >=3){
      questionAnswered = true;
      totalWrong += 1;
      totalAnswered++;
      clearInterval(timer);
      document.getElementById("result").innerText = "📌 Correct Answer: "+current.a+" — moving to next question...";
      playFailureSound();
      isInGameSession = false; // Question completed (failed)

      setTimeout(()=>{
        fullChallenges.shift();
        loadChallenge();
      },2000);
    } else {
      document.getElementById("result").innerText = "❌ Wrong! Try again";
      playFailureSound();
    }
  }
}

function giveUp(){
  clearInterval(timer);
  if(!questionAnswered) totalWrong +=1;
  isInGameSession = false; // User gave up
  showFinalResult();
}

function showFinalResult(){
  clearInterval(timer);
  document.getElementById("gameSection").style.display="none";
  document.getElementById("finalResult").style.display="block";
  document.getElementById("totalAnswered").innerText = totalAnswered;
  document.getElementById("totalWrong").innerText = totalWrong;
  document.getElementById("totalScore").innerText = totalScore;

  // Save score
  const user = localStorage.getItem("loggedInUser");
  if(user){
    const users = JSON.parse(localStorage.getItem('users') || '{}');
    if(users[user]){
      const previousScore = users[user].scores.easy || 0;
      users[user].scores.easy = Math.max(users[user].scores.easy, totalScore);
      users[user].challenges += 1;
      // Update level based on score
      if(totalScore > 500) users[user].level = 'Intermediate';
      if(totalScore > 1000) users[user].level = 'Advanced';

      // Add activity
      if(!users[user].activities) users[user].activities = [];
      users[user].activities.unshift({
        type: 'easy',
        game: 'Syntax Error - Abstract',
        score: totalScore,
        timestamp: new Date().toISOString(),
        improved: totalScore > previousScore
      });
      // Keep only last 10 activities
      users[user].activities = users[user].activities.slice(0, 10);

      localStorage.setItem('users', JSON.stringify(users));
    }
  }
}

// ====== Go Home ======
function goHome(){
  window.location.href = "/index.html";
}

loadChallenge();
</script>

</body>
</html>
