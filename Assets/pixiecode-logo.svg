<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
  
  <!-- Pixel grid pattern for "Pixie" -->
