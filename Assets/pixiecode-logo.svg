  <rect x="88" y="86" width="12" height="12" fill="#fbbf24"/>
  <rect x="100" y="86" width="12" height="12" fill="#fbbf24"/>
  
  <!-- Bottom section - decorative pixels -->
  <rect x="52" y="122" width="12" height="12" fill="#22d3ee"/>
  <rect x="64" y="122" width="12" height="12" fill="#22d3ee"/>
  <rect x="76" y="122" width="12" height="12" fill="#2ab1a1"/>
  <rect x="88" y="122" width="12" height="12" fill="#fbbf24"/>
  <rect x="100" y="122" width="12" height="12" fill="#22d3ee"/>
  <rect x="112" y="122" width="12" height="12" fill="#2ab1a1"/>
  
  <!-- Text label -->
  <text x="100" y="160" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#22d3ee" text-anchor="middle">PIXIECODE</text>
