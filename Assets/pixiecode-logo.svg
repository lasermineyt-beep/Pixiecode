  <rect x="40" y="50" width="12" height="12" fill="#22d3ee"/>
  <rect x="40" y="62" width="12" height="12" fill="#22d3ee"/>
  <rect x="40" y="74" width="12" height="12" fill="#22d3ee"/>
  <rect x="40" y="86" width="12" height="12" fill="#22d3ee"/>
  <rect x="40" y="98" width="12" height="12" fill="#22d3ee"/>
  <rect x="40" y="110" width="12" height="12" fill="#22d3ee"/>
  
  <rect x="52" y="50" width="12" height="12" fill="#22d3ee"/>
  <rect x="64" y="50" width="12" height="12" fill="#22d3ee"/>
  <rect x="52" y="62" width="12" height="12" fill="#22d3ee"/>
  <rect x="64" y="62" width="12" height="12" fill="#22d3ee"/>
  <rect x="52" y="74" width="12" height="12" fill="#22d3ee"/>
  <rect x="52" y="86" width="12" height="12" fill="#22d3ee"/>
  <rect x="64" y="86" width="12" height="12" fill="#22d3ee"/>
  
  <!-- Code brackets (< >) -->
  <rect x="76" y="50" width="12" height="12" fill="#2ab1a1"/>
  <rect x="76" y="62" width="12" height="12" fill="#2ab1a1"/>
  <rect x="76" y="74" width="12" height="12" fill="#2ab1a1"/>
  <rect x="76" y="86" width="12" height="12" fill="#2ab1a1"/>
  <rect x="76" y="98" width="12" height="12" fill="#2ab1a1"/>
  <rect x="76" y="110" width="12" height="12" fill="#2ab1a1"/>
  
  <rect x="112" y="50" width="12" height="12" fill="#2ab1a1"/>
  <rect x="112" y="62" width="12" height="12" fill="#2ab1a1"/>
  <rect x="112" y="74" width="12" height="12" fill="#2ab1a1"/>
  <rect x="112" y="86" width="12" height="12" fill="#2ab1a1"/>
  <rect x="112" y="98" width="12" height="12" fill="#2ab1a1"/>
  <rect x="112" y="110" width="12" height="12" fill="#2ab1a1"/>
  
  <!-- Center code symbol -->
  <rect x="88" y="74" width="12" height="12" fill="#fbbf24"/>
